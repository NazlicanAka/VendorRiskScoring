services:
  vendor-db:
    image: postgres:15-alpine
    container_name: vendor_risk_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: VendorRiskDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - risk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d VendorRiskDB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: vendor_risk_redis
    ports:
      - "6379:6379"
    networks:
      - risk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: vendor_risk_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - risk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.10.2
    container_name: vendor_risk_logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./src/VendorRiskScoring.API/logs:/usr/share/logstash/logs:ro
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - risk-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: vendor_risk_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - risk-network

  api:
    build:
      context: .
      dockerfile: src/VendorRiskScoring.API/Dockerfile
    container_name: vendor_risk_api
    ports:
      - "5188:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=vendor-db;Port=5432;Database=VendorRiskDB;Username=postgres;Password=supersecretpassword
      - ConnectionStrings__RedisConnection=vendor_risk_redis:6379
    volumes:
      - ./src/VendorRiskScoring.API/logs:/app/logs
    depends_on:
      vendor-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      logstash:
        condition: service_started
    networks:
      - risk-network

volumes:
  postgres_data:
  es_data:

networks:
  risk-network:
    driver: bridge
